<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary metadata -->
    <meta name="description" content="Turn any song into beautiful moving visuals directly in your browser." />
    <meta name="theme-color" content="#05030b" />
    <link rel="canonical" href="" /><!-- Set VITE_APP_URL and inject at build time -->

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="VYDRYN" />
    <meta property="og:description" content="Making sound visible." />
    <meta property="og:image"       content="/og-image.png" /><!-- Add 1200×630 social image -->
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="VYDRYN" />
    <meta name="twitter:description" content="Making sound visible." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- PWA / app -->
    <link rel="manifest"       href="/manifest.json" />
    <link rel="icon"           href="/favicon.ico" sizes="any" />
    <link rel="icon"           href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>VYDRYN — Making sound visible.</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
